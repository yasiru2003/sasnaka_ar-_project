<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Sasnaka Talent AR</title>
    <!-- A-Frame (Must load first) -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- AR.js for A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        .arjs-loader {
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .arjs-loader div {
            text-align: center;
            font-size: 1.25em;
            color: white;
            font-family: sans-serif;
        }
    </style>
</head>

<body style="margin: 0px; overflow: hidden;">
    <!-- Minimal Loader -->
    <div class="arjs-loader">
        <div>Loading AR Engine...<br><small>Please allow camera access</small></div>
    </div>

    <!-- A-Frame Scene -->
    <a-scene vr-mode-ui="enabled: false;" arjs="sourceType: webcam; debugUIEnabled: false;"
        renderer="antialias: true; alpha: true">

        <!-- Assets pre-loading -->
        <a-assets>
            <a-asset-item id="stage-model" src="models/stage.glb"></a-asset-item>
            <a-asset-item id="dancer-model" src="models/dancer.glb"></a-asset-item>
            <a-asset-item id="mic-model" src="models/microphone.glb"></a-asset-item>
        </a-assets>

        <!-- Hiro Marker Default Setup -->
        <a-marker preset="hiro" id="ar-marker">
            <!-- Stage Placeholder/Model -->
            <a-cylinder position="0 0 0" radius="1" height="0.1" color="#444444" shadow>
                <a-entity gltf-model="#stage-model" position="0 0 0" scale="0.5 0.5 0.5"></a-entity>
            </a-cylinder>

            <!-- Dancer Placeholder/Model -->
            <a-box position="0 0.5 0" width="0.3" height="1" depth="0.3" color="#ff0044"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
                <a-entity gltf-model="#dancer-model" position="0 -0.5 0" scale="0.2 0.2 0.2" animation-mixer></a-entity>
            </a-box>

            <!-- Interactive Microphone Button -->
            <a-sphere id="mic-btn" position="0.8 1 0" radius="0.2" color="#ffd700"
                material="emissive: #aa8800; emissiveIntensity: 0.5"
                animation="property: scale; dir: alternate; dur: 1000; to: 1.1 1.1 1.1; loop: true" class="clickable">
                <a-entity gltf-model="#mic-model" scale="0.1 0.1 0.1"></a-entity>
            </a-sphere>

            <!-- Floating Stars -->
            <a-octahedron position="-1 1.5 -1" radius="0.1" color="#ffff00"
                animation="property: rotation; to: 360 360 0; loop: true; dur: 2000"></a-octahedron>
            <a-octahedron position="1 2 1" radius="0.1" color="#ffff00"
                animation="property: rotation; to: 0 360 360; loop: true; dur: 2500"></a-octahedron>
            <a-octahedron position="-0.5 2.5 0.5" radius="0.05" color="#ffff00"
                animation="property: position; dir: alternate; dur: 1500; to: -0.5 2.8 0.5; loop: true"></a-octahedron>

            <!-- Lighting -->
            <a-light type="spot" position="0 5 0" target="#ar-marker" intensity="2"></a-light>
        </a-marker>

        <!-- Camera and Raycaster for Clicks -->
        <a-entity camera>
            <a-entity cursor="rayOrigin: mouse; fuse: false" raycaster="objects: .clickable"></a-entity>
        </a-entity>
    </a-scene>

    <script>
        // Hide loader when scene is loaded
        document.querySelector('a-scene').addEventListener('loaded', function () {
            document.querySelector('.arjs-loader').style.display = 'none';
        });

        // Click interaction for Microphone
        document.getElementById('mic-btn').addEventListener('click', function () {
            window.open('https://example.com/apply', '_blank');
        });
    </script>
</body>

</html>
