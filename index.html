<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Sasnaka Talent AR</title>
    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- MindAR for A-Frame -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
        }

        #start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: sans-serif;
            text-align: center;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #ff00cc;
            color: white;
            border: none;
            border-radius: 8px;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <!-- Start Screen to ensure user interaction for camera permissions -->
    <div id="start-overlay">
        <h1>Sasnaka Talent AR</h1>
        <p>1. Ensure your camera is allowed.<br>2. Point it at a recognized image marker.</p>
        <button id="start-btn">Start Scanning</button>
    </div>

    <!-- 
      MindAR Scene setup
      Note: imageTargetSrc points to a compiled .mind file containing the target image.
      We use a default sample target file here so it runs out of the box.
    -->
    <a-scene id="ar-scene"
        mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/image-tracking/assets/card-example/card.mind; autoStart: false;"
        color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <a-assets>
            <a-asset-item id="stage-model" src="models/stage.glb"></a-asset-item>
            <a-asset-item id="dancer-model" src="models/dancer.glb"></a-asset-item>
            <a-asset-item id="mic-model" src="models/microphone.glb"></a-asset-item>
        </a-assets>

        <!-- Camera Setup -->
        <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;"
            raycaster="objects: .clickable"></a-camera>

        <!-- Target specific elements (targetIndex: 0 maps to the first image in the .mind file) -->
        <a-entity mindar-image-target="targetIndex: 0">

            <!-- Stage Placeholder -->
            <a-cylinder position="0 0 0" radius="1" height="0.1" color="#444444" shadow>
                <a-entity gltf-model="#stage-model" position="0 0 0" scale="0.5 0.5 0.5"></a-entity>
            </a-cylinder>

            <!-- Dancer Placeholder -->
            <a-box position="0 0.5 0" width="0.3" height="1" depth="0.3" color="#ff0044"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
                <a-entity gltf-model="#dancer-model" position="0 -0.5 0" scale="0.2 0.2 0.2" animation-mixer></a-entity>
            </a-box>

            <!-- Interactive Microphone -->
            <a-sphere id="mic-btn" position="0.8 1 0" radius="0.2" color="#ffd700"
                material="emissive: #aa8800; emissiveIntensity: 0.5"
                animation="property: scale; dir: alternate; dur: 1000; to: 1.1 1.1 1.1; loop: true" class="clickable">
                <a-entity gltf-model="#mic-model" scale="0.1 0.1 0.1"></a-entity>
            </a-sphere>

            <!-- Floating Objects -->
            <a-octahedron position="-1 1.5 -1" radius="0.1" color="#ffff00"
                animation="property: rotation; to: 360 360 0; loop: true; dur: 2000"></a-octahedron>
            <a-octahedron position="1 2 1" radius="0.1" color="#ffff00"
                animation="property: rotation; to: 0 360 360; loop: true; dur: 2500"></a-octahedron>

            <a-light type="ambient" intensity="1"></a-light>
            <a-light type="directional" position="0 5 0" intensity="1.5"></a-light>
        </a-entity>
    </a-scene>

    <script>
        document.getElementById('start-btn').addEventListener('click', () => {
            // Hide overlay
            document.getElementById('start-overlay').style.display = 'none';
            // Start the MindAR engine manually
            const sceneEl = document.getElementById('ar-scene');
            sceneEl.systems["mindar-image-system"].start();
        });

        // Click interaction
        document.getElementById('mic-btn').addEventListener('click', function () {
            window.open('https://example.com/apply', '_blank');
        });
    </script>
</body>

</html>
