<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Sasnaka Talent AR</title>
    <link rel="stylesheet" href="style.css">
    <!-- Include Three.js -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

    <!-- Include GLTFLoader -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <!-- Include AR.js (Stable Version from jsDelivr) -->
    <script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3.4.5/three.js/build/ar.js"></script>

    <script>
        // Emergency Script Error Logger
        window.onerror = function (msg, url, lineNo, columnNo, error) {
            var status = document.getElementById('status');
            if (status) {
                status.innerHTML = 'Error: ' + msg + '<br><small>Line: ' + lineNo + '</small>';
                status.style.color = '#ff4444';
            }
            return false;
        };
    </script>
</head>

<body style='margin : 0px; overflow: hidden;'>
    <div id="ui-container">
        <h1>Sasnaka Talent Show AR</h1>
        <p id="status">Connecting to AR Engine...</p>
        <button id="retry-btn"
            style="display:none; pointer-events: auto; padding: 10px; background: #333; color: white; border: 1px solid #fff; border-radius: 5px; margin-top: 10px;"
            onclick="window.location.reload()">Refresh Page</button>
    </div>

    <script src="main.js"></script>
</body>

</html>
