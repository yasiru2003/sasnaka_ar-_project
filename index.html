<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Sasnaka Talent AR</title>
    <link rel="stylesheet" href="style.css">
    <!-- Include Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Script Loading Debugger -->
    <script>
        window.addEventListener('error', function (e) {
            var status = document.getElementById('status');
            if (status) {
                status.innerText = 'Script Error: ' + e.message;
                status.style.color = '#ff4444';
            }
        }, true);
        console.log('Three.js version:', THREE ? THREE.REVISION : 'Not Loaded');
    </script>

    <!-- Include AR.js (Stable Version from unpkg) -->
    <script src="https://unpkg.com/@ar-js-org/ar.js@3.4.5/three.js/build/ar.js"></script>

    <!-- Include GLTFLoader -->
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
</head>

<body style='margin : 0px; overflow: hidden;'>
    <div id="ui-container">
        <h1>Sasnaka Talent Show AR</h1>
        <p id="status">Loading AR Scene...</p>
    </div>

    <script src="main.js"></script>
</body>

</html>
